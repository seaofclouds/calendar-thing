name = "calendar-thing"
main = "src/index.ts"
compatibility_date = "2026-04-02"
preview_urls = true

[assets]
directory = "./public"

# Resolve workspace packages for wrangler's bundler
[alias]
"@calendar-feeds/feeds" = "../../packages/feeds/src/index.ts"

# Allow importing .ics files as text modules (for fixture data)
[[rules]]
type = "Text"
globs = ["**/*.ics"]
fallthrough = true

[[services]]
binding = "ASTRONOMY"
service = "calendar-astronomy"

[[services]]
binding = "MOVIE_RELEASE"
service = "calendar-movies"

[[services]]
binding = "HOLIDAYS_US"
service = "calendar-holidays-us"

[[services]]
binding = "ASTROLOGY"
service = "calendar-astrology"
