name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy all workers (skip change detection)'
        type: boolean
        default: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm -r run typecheck

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      moon-phase: ${{ steps.filter.outputs.moon-phase }}
      movie-release: ${{ steps.filter.outputs.movie-release }}
      calendar: ${{ steps.filter.outputs.calendar }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            moon-phase:
              - 'feeds/moon-phase/**'
              - 'packages/**'
            movie-release:
              - 'feeds/movie-release/**'
              - 'packages/**'
            calendar:
              - 'apps/calendar/**'
              - 'packages/**'

  deploy-moon-phase:
    needs: [typecheck, detect-changes]
    if: needs.detect-changes.outputs.moon-phase == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_all)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @calendar-feeds/moon-phase run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

  deploy-movie-release:
    needs: [typecheck, detect-changes]
    if: needs.detect-changes.outputs.movie-release == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_all)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @calendar-feeds/movie-release run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

  # deploy-calendar: Disabled — CF git integration handles calendar deploys + previews.
  # Uncomment if reverting to Actions-only deploys.
